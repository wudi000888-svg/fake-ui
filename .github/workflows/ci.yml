name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -r requirements.txt

      - name: Compile baseline modules
        run: python -m compileall -q baseline

      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m pytest -vv --maxfail=1 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path

          text = Path("pytest.log").read_text(encoding="utf-8", errors="replace")
          tail = "\n".join(text.splitlines()[-80:])
          tail = tail.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error file=pytest.log,line=1,title=pytest failure::{tail}")
          PY
            exit "$status"
          fi
