name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release notes
        id: notes
        run: |
          notes="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes" ]; then
            notes="README.md"
          fi
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="fake-ui-${GITHUB_REF_NAME}/" \
            -o "dist/fake-ui-${GITHUB_REF_NAME}.tar.gz" \
            "$GITHUB_SHA"

      - name: Build bridge client assets
        run: |
          python scripts/package-bridge-client.py dist --version "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "fake-ui ${GITHUB_REF_NAME}" \
              --notes-file "${{ steps.notes.outputs.path }}" \
              --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "fake-ui ${GITHUB_REF_NAME}" \
              --notes-file "${{ steps.notes.outputs.path }}" \
              --latest \
              --verify-tag
          fi

          gh release upload "$GITHUB_REF_NAME" \
            "dist/fake-ui-${GITHUB_REF_NAME}.tar.gz" \
            "dist/fake-ui-bridge-client-v${GITHUB_REF_NAME#v}-macos.zip" \
            "dist/fake-ui-bridge-client-v${GITHUB_REF_NAME#v}-linux.tar.gz" \
            "dist/fake-ui-bridge-client-v${GITHUB_REF_NAME#v}-windows.zip" \
            --clobber
